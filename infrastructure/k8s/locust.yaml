apiVersion: v1
kind: Service
metadata:
  name: locust-master
  labels:
    app: locust-master
spec:
  ports:
    - port: 8089
      targetPort: 8089
      name: web
    - port: 5557
      targetPort: 5557
      name: communication
  selector:
    app: locust-master
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-master
  template:
    metadata:
      labels:
        app: locust-master
    spec:
      containers:
        - name: locust-master
          image: your-docker-hub-username/petstore-locust:latest # Updated via Jenkins
          args: 
            - "-f"
            - "locustfile.py"
            - "--master"
            - "--web-host"
            - "0.0.0.0"
            - "--host"
            - "https://petstore.swagger.io"
          ports:
            - containerPort: 8089
              name: web
            - containerPort: 5557
              name: communication
          readinessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
        - name: locust-worker
          image: your-docker-hub-username/petstore-locust:latest # Updated via Jenkins
          args: 
            - "-f"
            - "locustfile.py"
            - "--worker"
            - "--master-host"
            - "locust-master"
            - "--host"
            - "https://petstore.swagger.io"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
